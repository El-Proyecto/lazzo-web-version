name: CI

on:
  push:
    branches: [develop]
  pull_request:
    branches: [develop]

jobs:
  flutter-ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java (JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.x'
          channel: stable
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      - name: Lint
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Format check
        run: dart format --set-exit-if-changed .

      - name: Run unit+widget tests (coverage)
        run: flutter test --coverage

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-lcov
          path: coverage/lcov.info

      # Falhar cedo se secrets estiverem vazios (opcional mas útil)
      - name: Check required secrets (DEV)
        run: |
          test -n "${{ secrets.SUPABASE_URL_DEV }}" || (echo "Missing SUPABASE_URL_DEV" && exit 1)
          test -n "${{ secrets.SUPABASE_ANON_KEY_DEV }}" || (echo "Missing SUPABASE_ANON_KEY_DEV" && exit 1)

      - name: Build debug APK (DEV)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL_DEV }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY_DEV }}
        run: |
          echo '{ "APP_ENV": "dev" }' > env/dev.json
          flutter build apk --debug \
            --dart-define-from-file=env/dev.json \
            --dart-define=SUPABASE_URL=${SUPABASE_URL} \
            --dart-define=SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
